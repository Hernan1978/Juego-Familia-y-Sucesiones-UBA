<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexPlay UBA - Tribunal de Alumnos</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        /* ESTILOS E IDENTIDAD VISUAL DE TU COMPILADO */
        body {
            font-family: 'Poppins', sans-serif;
            background-image: url("https://images.unsplash.com/photo-1521587760476-6c12a4b040da?q=80&w=2070");
            background-size: cover; background-attachment: fixed; text-align: center; margin: 0; padding: 20px;
        }
        .titulo-oro {
            color: #FFFFFF !important; font-size: 3.5rem !important; font-weight: 800; text-transform: uppercase;
            text-shadow: 0 0 10px #D4AF37, 0 0 20px #D4AF37, 3px 3px 5px #000 !important; margin-bottom: 5px;
        }
        .subtitulo {
            color: #CCFF00; font-size: 1.1rem; font-weight: 700; text-shadow: 2px 2px 4px #000; margin-bottom: 25px;
        }
        .pregunta-card {
            background: rgba(0, 0, 0, 0.82); border: 3px solid #D4AF37; border-radius: 20px;
            padding: 25px; margin: 15px auto; width: 90%; max-width: 800px; color: #FFFFFF;
            font-size: 1.8rem; font-weight: 800; text-shadow: 2px 2px 6px #000; box-sizing: border-box;
        }
        .reloj-container {
            background-color: rgba(0,0,0,0.85); color: #FF4B4B; font-size: 4rem; font-weight: 800;
            padding: 10px 40px; border-radius: 20px; border: 5px solid #FF4B4B; display: inline-block;
            margin: 15px 0; text-shadow: 0 0 15px #FF4B4B; animation: pulso 1s infinite;
        }
        @keyframes pulso { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
        
        .grid-opciones { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 800px; margin: 20px auto; }
        .kahoot-btn {
            display: flex; align-items: center; justify-content: center; color: white; font-size: 1.4rem;
            font-weight: 800; padding: 20px; border-radius: 15px; cursor: pointer;
            border: 3px solid rgba(255,255,255,0.4); text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
            transition: transform 0.1s; min-height: 80px; box-sizing: border-box; width: 100%;
        }
        .kahoot-btn:hover { transform: scale(1.02); }
        
        /* Cajas de Podio Estilo Kahoot de tu código original */
        .box-oro { background: linear-gradient(145deg,#D4AF37,#B8860B); color:#FFF; padding:25px; border-radius:15px; width:85%; max-width:600px; font-size:2.2rem; font-weight:800; border:4px solid #FFF; text-shadow:2px 2px 5px #000; margin:auto; }
        .box-plata { background: linear-gradient(145deg,#C0C0C0,#808080); color:#FFF; padding:18px; border-radius:12px; width:75%; max-width:500px; font-size:1.7rem; font-weight:700; margin:10px auto; }
        .box-bronce { background: linear-gradient(145deg,#CD7F32,#8B4513); color:#FFF; padding:15px; border-radius:10px; width:65%; max-width:400px; font-size:1.4rem; font-weight:700; margin:10px auto; }
        .espera-box { background: rgba(0,0,0,0.75); border: 3px solid #D4AF37; border-radius: 20px; padding: 30px; margin: 20px auto; width: 80%; max-width: 700px; color: #CCFF00; font-size: 1.6rem; font-weight: 800; text-shadow: 2px 2px 6px #000; animation: brillar 2s infinite; }
        @keyframes brillar { 0%,100%{border-color:#D4AF37; box-shadow:0 0 10px #D4AF37;} 50%{border-color:#FFF; box-shadow:0 0 30px #D4AF37;} }
        .participante-chip { display: inline-block; background: rgba(212,175,55,0.3); border: 2px solid #D4AF37; border-radius: 20px; padding: 6px 16px; margin: 4px; color: #CCFF00; font-weight: 700; font-size: 0.95rem; }
        
        /* Formulario de Login */
        .login-card { background: rgba(0,0,0,0.85); border: 3px solid #D4AF37; border-radius: 20px; padding: 30px; max-width: 500px; margin: 30px auto; text-align: left; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .login-card label { color: #CCFF00; font-weight: 800; display: block; margin-top: 15px; margin-bottom: 5px; text-shadow: 1px 1px 2px #000; }
        .login-card input[type="text"], .login-card input[type="email"] { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid #333; font-size: 1rem; box-sizing: border-box; background: #fff; color: #000; font-family: 'Poppins', sans-serif; }
        .radio-group { display: flex; gap: 20px; margin-top: 5px; }
        .radio-label { color: #FFF !important; font-weight: 600 !important; display: flex; align-items: center; gap: 5px; cursor: pointer; }
        .btn-ingresar { background-color: #D4AF37; color: #000; font-weight: 800; border: 2px solid #000; width: 100%; font-size: 1.1rem; border-radius: 10px; padding: 12px; margin-top: 25px; cursor: pointer; text-transform: uppercase; font-family: 'Poppins', sans-serif; transition: background 0.2s; }
        .btn-ingresar:hover { background-color: #fff; }
        
        .img-ganador { width: 90%; max-width: 500px; border-radius: 15px; border: 4px solid #D4AF37; box-shadow: 0 0 20px #D4AF37; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="audio-contenedor"></div>
    <h1 class="titulo-oro">🏛️ LEXPLAY UBA</h1>
    <div class="subtitulo">Derecho de Familia y Sucesiones</div>

    <div id="pantalla-dinamica">
        <div class="login-card">
            <label>✉️ Email académico:</label>
            <input type="email" id="login-email" placeholder="ejemplo@derecho.uba.ar">
            
            <label>👤 Nombre Completo:</label>
            <input type="text" id="login-nombre" placeholder="Dr./Dra. Nombre y Apellido">
            
            <label>🎓 Título de Estrado:</label>
            <div class="radio-group">
                <label class="radio-label"><input type="radio" name="login-titulo" value="Dr." checked> Dr.</label>
                <label class="radio-label"><input type="radio" name="login-titulo" value="Dra."> Dra.</label>
            </div>
            
            <button class="btn-ingresar" onclick="procesarLogin()">⚖️ Ingresar al Tribunal</button>
        </div>
    </div>

    <script>
        // 🚨 CONFIGURACIÓN DE TU REPOSITORIO Y API 🚨
        const URL_APPS_SCRIPT = "https://script.google.com/macros/s/AKfycbzIkrNfH2Ji_YnAXAL7Rw3cVghN97cVNtt80AAJulZ1if5QIRKu-v1QloCnZNwuyoYGlg/exec";
        const IMG_BASE = "https://raw.githubusercontent.com/Hernan1978/Juego-Familia-y-Sucesiones-UBA/main/";
        
        const AUDIO = {
            "bienvenida": "https://raw.githubusercontent.com/Hernan1978/Juego-Familia-y-Sucesiones-UBA/main/bienvenida.mp3",
            "exito":      "https://raw.githubusercontent.com/Hernan1978/Juego-Familia-y-Sucesiones-UBA/main/exito.mp3",
            "error":      "https://raw.githubusercontent.com/Hernan1978/Juego-Familia-y-Sucesiones-UBA/main/error.mp3",
            "ganador":    "https://raw.githubusercontent.com/Hernan1978/Juego-Familia-y-Sucesiones-UBA/main/ganador.mp3",
        };
        const COLORES = ["#E21B3C", "#1368CE", "#26890C", "#FFA602"];
        const ICONOS  = ["▲", "◆", "●", "■"];

        let USER = null; // Se completa al loguearse
        let faseActual = -1;
        let yaVotoFase = -1;
        let cronometroInterval = null;
        let audioReproducido = "";

        // Reproducir audio de bienvenida al abrir la app
        window.onload = () => { reproducirAudio("bienvenida"); };

        function reproducirAudio(key) {
            if (audioReproducido === key) return;
            audioReproducido = key;
            document.getElementById("audio-contenedor").innerHTML = `<audio autoplay><source src="${AUDIO[key]}" type="audio/mp3"></audio>`;
        }

        async function procesarLogin() {
            let email = document.getElementById("login-email").value.trim();
            let nombre = document.getElementById("login-nombre").value.trim();
            let titulo = document.querySelector('input[name="login-titulo"]:checked').value;

            if (email === "" || nombre === "" || !email.includes("@")) {
                alert("⚠️ Por favor ingrese un email válido y su nombre completo.");
                return;
            }

            USER = { email: email, nombre: nombre, titulo: titulo };
            
            // Mostrar pantalla de carga momentánea
            document.getElementById("pantalla-dinamica").innerHTML = "<div class='espera-box'>⚖️ Registrando su firma en el estrado...</div>";

            try {
                // Registrar nuevo alumno en la hoja de Google Sheets
                await fetch(URL_APPS_SCRIPT, {
                    method: 'POST',
                    body: JSON.stringify({
                        accion: "nuevo_usuario",
                        usuario: { EMAIL: email, NOMBRE: nombre, TITULO: titulo }
                    })
                });
                
                // Iniciar sincronización constante cada 3 segundos
                setInterval(chequearServidor, 3000);
                chequearServidor();
            } catch(e) {
                alert("Error de conexión con el estrado de Google.");
            }
        }

        async function chequearServidor() {
            if (!USER) return; // Si no se logueó, no consulta nada
            try {
                let res = await fetch(URL_APPS_SCRIPT);
                let data = await res.json();
                
                let faseServ = parseInt(data.sistema.fase);
                let tLimite = parseFloat(data.sistema.tiempo);
                let alumnos = data.alumnos || [];
                let preguntas = data.preguntas || [];

                if (faseActual !== faseServ) {
                    faseActual = faseServ;
                    renderizarPantalla(faseServ, tLimite, alumnos, preguntas);
                }
            } catch (e) { console.error("Error de sincronización:", e); }
        }

        function renderizarPantalla(fase, tLimite, alumnos, preguntas) {
            clearInterval(cronometroInterval);
            const panel = document.getElementById("pantalla-dinamica");
            let ahora = Date.now() / 1000;

            // ── SALA DE ESPERA (FASE 0) ──
            if (fase === 0) {
                reproducirAudio("bienvenida");
                let chips = alumnos.map(al => `<span class='participante-chip'>⚖️ ${al.TITULO || 'Dr.'} ${al.NOMBRE}</span>`).join('');
                panel.innerHTML = `
                    <div class='espera-box'>⚖️ El Tribunal está deliberando...<br><span style='font-size:1.1rem;color:#FFF;font-weight:400'>Enseguida comenzamos. ¡Preparate!</span></div>
                    <p style='color:#D4AF37;font-size:1.2rem;font-weight:800;text-shadow:2px 2px 4px #000;'>👥 Participantes conectados:</p>
                    <div>${chips || '<p style="color:#FFF;">Esperando respuestas del estrado...</p>'}</div>
                `;
            }
            // ── RESULTADOS PARCIALES (FASE 88) ──
            else if (fase === 88) {
                alumnos.sort((a,b) => b.PUNTOS - a.PUNTOS);
                let filas = alumnos.map((al, idx) => {
                    let medal = idx < 3 ? ["🥇","🥈","🥉"][idx] : `${idx+1}°`;
                    let colBorder = idx < 3 ? ["#D4AF37","#C0C0C0","#CD7F32"][idx] : "#444";
                    return `<div style='background:rgba(0,0,0,0.7);border-left:6px solid ${colBorder};border-radius:10px;padding:12px 20px;margin:6px auto;width:70%;color:#FFF;font-size:1.2rem;font-weight:700;text-align:left;'>
                        ${medal} ${al.TITULO || 'Dr.'} ${al.NOMBRE} — ${parseInt(al.PUNTOS)} pts
                    </div>`;
                }).join('');
                panel.innerHTML = `<h2>📊 Resultados Parciales</h2>${filas}`;
            }
            // ── PODIO FINAL (FASE 99) ──
            else if (fase === 99) {
                reproducirAudio("ganador");
                alumnos.sort((a,b) => b.PUNTOS - a.PUNTOS);
                
                let podioHtml = "";
                if(alumnos[0]) {
                    // Lógica de imágenes según género exacta a tu versión original
                    let imgGanador = (alumnos[0].TITULO === "Dra.") ? "alumna_festejo_uba.png" : "alumno_festejo_uba.png";
                    podioHtml += `<img src="${IMG_BASE + imgGanador}" class="img-ganador">`;
                    podioHtml += `<h1 class='titulo-oro'>🏆 ${alumnos[0].TITULO || 'Dr.'} ${alumnos[0].NOMBRE} 🏆</h1>`;
                    podioHtml += `<div class='box-oro'>🥇 ORO: ${alumnos[0].NOMBRE}<br><span style='font-size:1.5rem'>${parseInt(alumnos[0].PUNTOS)} puntos</span></div><br>`;
                }
                if(alumnos[1]) podioHtml += `<div class='box-plata'>🥈 PLATA: ${alumnos[1].NOMBRE} — ${parseInt(alumnos[1].PUNTOS)} pts</div><br>`;
                if(alumnos[2]) podioHtml += `<div class='box-bronce'>🥉 BRONCE: ${alumnos[2].NOMBRE} — ${parseInt(alumnos[2].PUNTOS)} pts</div>`;
                
                panel.innerHTML = podioHtml;
            }
            // ── PREGUNTAS ACTIVAS ──
            else {
                let p = preguntas.find(preg => preg.ID == fase);
                if (!p) return;

                let relojHtml = (tLimite > ahora && yaVotoFase !== fase) ? `<div style='text-align:center'><div class='reloj-container' id='cronometro'>⏱️ --s</div></div>` : '';
                let opcionesHtml = "";
                let opcionesArr = [p.OP1, p.OP2, p.OP3, p.OP4].filter(o => o);
                
                if (yaVotoFase === fase) {
                    opcionesHtml = `<div class='espera-box'>📥 Tu dictamen fue enviado. Esperando resolución general...</div>`;
                } else {
                    opcionesHtml = `<div class='grid-opciones'>` + opcionesArr.map((op, i) => `
                        <button class='kahoot-btn' style='background:${COLORES[i]}' onclick='votar("${op.replace(/"/g, '&quot;')}", "${p.CORRECTA.replace(/"/g, '&quot;')}", ${tLimite})' ${tLimite <= ahora ? 'disabled':''}>
                            ${ICONOS[i]} ${op}
                        </button>
                    `).join('') + `</div>`;
                }

                panel.innerHTML = `
                    <div class='pregunta-card'>❓ ${p.PREGUNTA}</div>
                    ${relojHtml}
                    ${opcionesHtml}
                `;

                if (tLimite > ahora && yaVotoFase !== fase) {
                    cronometroInterval = setInterval(() => {
                        let secRestantes = Math.max(0, Math.floor(tLimite - (Date.now() / 1000)));
                        let el = document.getElementById('cronometro');
                        if (el) el.innerText = `⏱️ ${secRestantes}s`;
                        if (secRestantes <= 0) {
                            clearInterval(cronometroInterval);
                            chequearServidor(); 
                        }
                    }, 250);
                }
            }
        }

        async function votar(opcionSeleccionada, opcionCorrecta, tLimite) {
            yaVotoFase = faseActual;
            let ahora = Date.now() / 1000;
            let esCorrecto = (opcionSeleccionada === opcionCorrecta);
            
            reproducirAudio(esCorrecto ? "exito" : "error");

            let bonus = Math.max(0, Math.min(parseInt(tLimite - ahora), 15));
            let puntosA_Sumar = esCorrecto ? (10 + bonus) : 0;

            const panel = document.getElementById("pantalla-dinamica");
            if(esCorrecto) {
                panel.innerHTML += `<div style='background:rgba(38,137,12,0.85);border-radius:15px;padding:20px;color:#FFF;font-size:1.6rem;font-weight:800;margin:10px auto;width:70%;'>✅ ¡CORRECTO! +${puntosA_Sumar} puntos 🎉</div>`;
            } else {
                panel.innerHTML += `<div style='background:rgba(226,27,60,0.85);border-radius:15px;padding:20px;color:#FFF;font-size:1.6rem;font-weight:800;margin:10px auto;width:70%;'>❌ Incorrecto. La respuesta del Tribunal era: ${opcionCorrecta}</div>`;
            }

            try {
                await fetch(URL_APPS_SCRIPT, {
                    method: 'POST',
                    body: JSON.stringify({
                        accion: "sumar_puntos",
                        usuario: { email: USER.email, pts: puntosA_Sumar }
                    })
                });
            } catch(e) { console.error("Error registrando voto", e); }
        }
    </script>
</body>
</html>
