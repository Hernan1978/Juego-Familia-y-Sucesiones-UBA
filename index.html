<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexPlay UBA</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-image: url("https://images.unsplash.com/photo-1521587760476-6c12a4b040da?q=80&w=2070"); background-size: cover; background-attachment: fixed; text-align: center; margin: 0; padding: 20px; color: #FFF; }
        .titulo-oro { color: #FFFFFF !important; font-size: 3.5rem !important; font-weight: 800; text-transform: uppercase; text-shadow: 0 0 10px #D4AF37, 0 0 20px #D4AF37, 3px 3px 5px #000 !important; margin-bottom: 5px; }
        .subtitulo { color: #CCFF00; font-size: 1.1rem; font-weight: 700; text-shadow: 2px 2px 4px #000; margin-bottom: 25px; }
        .pregunta-card { background: rgba(0, 0, 0, 0.85); border: 3px solid #D4AF37; border-radius: 20px; padding: 25px; margin: 15px auto; width: 90%; max-width: 800px; color: #FFFFFF; font-size: 1.8rem; font-weight: 800; text-shadow: 2px 2px 6px #000; box-sizing: border-box; }
        .reloj-container { background-color: rgba(0,0,0,0.85); color: #FF4B4B; font-size: 4rem; font-weight: 800; padding: 10px 40px; border-radius: 20px; border: 5px solid #FF4B4B; display: inline-block; margin: 15px 0; text-shadow: 0 0 15px #FF4B4B; animation: pulso 1s infinite; }
        @keyframes pulso { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
        .grid-opciones { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 800px; margin: 20px auto; }
        .kahoot-btn { display: flex; align-items: center; justify-content: center; color: white; font-size: 1.4rem; font-weight: 800; padding: 20px; border-radius: 15px; cursor: pointer; border: 3px solid rgba(255,255,255,0.4); text-shadow: 1px 1px 3px rgba(0,0,0,0.5); transition: transform 0.1s; min-height: 80px; box-sizing: border-box; width: 100%; }
        .kahoot-btn:hover { transform: scale(1.02); }
        .box-oro { background: linear-gradient(145deg,#D4AF37,#B8860B); color:#FFF; padding:25px; border-radius:15px; width:85%; max-width:600px; font-size:2.2rem; font-weight:800; border:4px solid #FFF; text-shadow:2px 2px 5px #000; margin:auto; }
        .box-plata { background: linear-gradient(145deg,#C0C0C0,#808080); color:#FFF; padding:18px; border-radius:12px; width:75%; max-width:500px; font-size:1.7rem; font-weight:700; margin:10px auto; }
        .box-bronce { background: linear-gradient(145deg,#CD7F32,#8B4513); color:#FFF; padding:15px; border-radius:10px; width:65%; max-width:400px; font-size:1.4rem; font-weight:700; margin:10px auto; }
        .espera-box { background: rgba(0,0,0,0.75); border: 3px solid #D4AF37; border-radius: 20px; padding: 30px; margin: 20px auto; width: 80%; max-width: 700px; color: #CCFF00; font-size: 1.6rem; font-weight: 800; text-shadow: 2px 2px 6px #000; animation: brillar 2s infinite; }
        @keyframes brillar { 0%,100%{border-color:#D4AF37; box-shadow:0 0 10px #D4AF37;} 50%{border-color:#FFF; box-shadow:0 0 30px #D4AF37;} }
        .participante-chip { display: inline-block; background: rgba(212,175,55,0.3); border: 2px solid #D4AF37; border-radius: 20px; padding: 6px 16px; margin: 4px; color: #CCFF00; font-weight: 700; font-size: 0.95rem; }
        .login-card { background: rgba(0,0,0,0.85); border: 3px solid #D4AF37; border-radius: 20px; padding: 30px; max-width: 500px; margin: 30px auto; text-align: left; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .login-card label { color: #CCFF00; font-weight: 800; display: block; margin-top: 15px; margin-bottom: 5px; }
        .login-card input[type="text"] { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid #333; font-size: 1rem; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        .radio-group { display: flex; gap: 20px; margin-top: 5px; }
        .radio-label { color: #FFF; font-weight: 600; display: flex; align-items: center; gap: 5px; cursor: pointer; }
        .btn-ingresar { background-color: #D4AF37; color: #000; font-weight: 800; border: 2px solid #000; width: 100%; font-size: 1.1rem; border-radius: 10px; padding: 12px; margin-top: 25px; cursor: pointer; text-transform: uppercase; font-family: 'Poppins', sans-serif; }
        table { width: 100%; max-width: 700px; margin: 15px auto; background-color: rgba(0,0,0,0.85); border-collapse: collapse; border-radius: 12px; overflow: hidden; border: 2px solid #D4AF37; }
        th, td { padding: 14px; color: #FFFFFF !important; font-weight: 600; text-shadow: 1px 1px 3px #000; border-bottom: 1px solid #333; text-align: center; font-size: 1.1rem; }
        th { color: #CCFF00 !important; background-color: rgba(0,0,0,0.6); font-weight: 800; }
        .panel-juez { max-width: 1000px; margin: 20px auto; background: rgba(0,0,0,0.92); border: 3px solid #D4AF37; border-radius: 20px; padding: 25px; text-align: left; }
        .grid-docente-controles { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; background: #111; padding: 15px; border-radius: 12px; border: 1px solid #333; }
        .docente-btn { background: #D4AF37; color: #000; font-weight: 800; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; text-transform: uppercase; font-family: 'Poppins', sans-serif; }
        .docente-btn:hover { background: #FFF; }
        .img-ganador { width: 90%; max-width: 550px; border-radius: 15px; border: 4px solid #D4AF37; margin-bottom: 20px; }
        .votos-badge { background: #1368CE; color: #FFF; padding: 5px 15px; border-radius: 5px; font-weight: 800; font-size: 1.2rem; display: inline-block; margin-top: 10px; }
        .notif-flash { background: #26890C; color: white; padding: 10px; border-radius: 8px; font-weight: 700; margin-top: 10px; text-align: center; display: none; }
    </style>
</head>
<body>

    <div id="audio-contenedor"></div>
    <h1 class="titulo-oro">🏛️ LEXPLAY UBA</h1>
    <div class="subtitulo">Derecho de Familia y Sucesiones-UBA-CATEDRAS 6387-6388</div>

    <div id="pantalla-dinamica">
        <div class="login-card">
            <label>✉️ Email académico o Clave Docente:</label>
            <input type="text" id="login-id" placeholder="ejemplo@derecho.uba.ar o clave">
            
            <div id="campos-alumno">
                <label>👤 Nombre Completo:</label>
                <input type="text" id="login-nombre" placeholder="Nombre y Apellido">
                
                <label>🎓 Título de Estrado:</label>
                <div class="radio-group">
                    <label class="radio-label"><input type="radio" name="login-titulo" value="Dr." checked> Dr.</label>
                    <label class="radio-label"><input type="radio" name="login-titulo" value="Dra."> Dra.</label>
                </div>
            </div>
            
            <button class="btn-ingresar" onclick="procesarIngreso()">⚖️ INGRESAR AL TRIBUNAL</button>
        </div>
    </div>

    <script>
        const URL_APPS_SCRIPT = "https://script.google.com/macros/s/AKfycbzIkrNfH2Ji_YnAXAL7Rw3cVghN97cVNtt80AAJulZ1if5QIRKu-v1QloCnZNwuyoYGlg/exec";
        const CLAVE_DOCENTE = "derecho2024";
        const IMG_BASE = "https://raw.githubusercontent.com/Hernan1978/Juego-Familia-y-Sucesiones-UBA/main/";
        
        const AUDIO = {
            "bienvenida": "https://raw.githubusercontent.com/Hernan1978/Juego-Familia-y-Sucesiones-UBA/main/bienvenida.mp3",
            "exito":      "https://raw.githubusercontent.com/Hernan1978/Juego-Familia-y-Sucesiones-UBA/main/exito.mp3",
            "error":      "https://raw.githubusercontent.com/Hernan1978/Juego-Familia-y-Sucesiones-UBA/main/error.mp3",
            "ganador":    "https://raw.githubusercontent.com/Hernan1978/Juego-Familia-y-Sucesiones-UBA/main/ganador.mp3",
        };
        const COLORES = ["#E21B3C", "#1368CE", "#26890C", "#FFA602"];
        const ICONOS  = ["▲", "◆", "●", "■"];

        let USER = null; 
        let faseActual = -1;
        let yaVotoFase = -1;
        let cronometroInterval = null;
        let audioReproducido = "";
        let opcionSelectorDocenteLocal = "0"; 

        // 🚨 COMPROBACIÓN DE ENTRADA DIRECTA PARA EL DOCENTE
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('rol') === 'juez') {
                document.getElementById("login-id").value = CLAVE_DOCENTE;
                procesarIngreso();
            }
        };

        document.getElementById("login-id").addEventListener("input", (e) => {
            let val = e.target.value.trim();
            document.getElementById("campos-alumno").style.display = (val === CLAVE_DOCENTE) ? "none" : "block";
        });

        function playAudio(key) {
            document.getElementById("audio-contenedor").innerHTML = `<audio autoplay><source src="${AUDIO[key]}" type="audio/mp3"></audio>`;
        }

        async function procesarIngreso() {
            let idInput = document.getElementById("login-id").value.trim();

            if (idInput === CLAVE_DOCENTE) {
                USER = { tipo: "juez" };
                playAudio("bienvenida");
                document.getElementById("pantalla-dinamica").innerHTML = "<div class='espera-box'>⚖️ Abriendo Estrado Presidencial...</div>";
                setInterval(sincronizarNucleo, 3000);
                sincronizarNucleo();
            } else {
                let nombre = document.getElementById("login-nombre").value.trim();
                let titulo = document.querySelector('input[name="login-titulo"]:checked').value;

                if (idInput === "" || nombre === "" || !idInput.includes("@")) {
                    alert("⚠️ Ingrese un email académico válido y su nombre.");
                    return;
                }

                USER = { tipo: "alumno", email: idInput, nombre: nombre, titulo: titulo };
                playAudio("bienvenida");
                document.getElementById("pantalla-dinamica").innerHTML = "<div class='espera-box'>⚖️ Registrando Matrícula...</div>";

                try {
                    await fetch(URL_APPS_SCRIPT, {
                        method: 'POST',
                        body: JSON.stringify({ accion: "nuevo_usuario", usuario: { EMAIL: idInput, NOMBRE: nombre, TITULO: titulo } })
                    });
                    setInterval(sincronizarNucleo, 3000);
                    sincronizarNucleo();
                } catch(e) { alert("Falla al conectar con Google Sheets."); }
            }
        }

        async function sincronizarNucleo() {
            if (!USER) return;
            try {
                let res = await fetch(URL_APPS_SCRIPT);
                let data = await res.json();
                
                let faseServ = parseInt(data.sistema.fase);
                let tLimite = parseFloat(data.sistema.tiempo);
                let alumnos = data.alumnos || [];
                let preguntas = data.preguntas || [];

                if (USER.tipo === "juez") {
                    renderizarDocente(faseServ, tLimite, alumnos, preguntas);
                } else {
                    if (faseActual !== faseServ) { faseActual = faseServ; }
                    renderizarAlumno(faseServ, tLimite, alumnos, preguntas);
                }
            } catch (e) { console.error("Error:", e); }
        }

        function renderizarAlumno(fase, tLimite, alumnos, preguntas) {
            clearInterval(cronometroInterval);
            const panel = document.getElementById("pantalla-dinamica");
            let ahora = Date.now() / 1000;
            let htmlInyectar = "";

            if (fase === 0) {
                let chips = alumnos.map(al => `<span class='participante-chip'>⚖️ ${al.TITULO || 'Dr.'} ${al.NOMBRE}</span>`).join('');
                htmlInyectar = `
                    <div class='espera-box'>⚖️ El Tribunal está deliberando...<br><span style='font-size:1.1rem;color:#FFF;font-weight:400'>Enseguida comenzamos. ¡Preparate!</span></div>
                    <p style='color:#D4AF37;font-size:1.2rem;font-weight:800;text-shadow:2px 2px 4px #000;'>👥 Participantes en el estrado:</p>
                    <div>${chips || '<p style="color:#FFF;">Esperando participantes...</p>'}</div>
                `;
            } 
            else if (fase === 88) {
                alumnos.sort((a,b) => b.PUNTOS - a.PUNTOS);
                let filas = alumnos.map((al, idx) => {
                    let medal = idx < 3 ? ["🥇","🥈","🥉"][idx] : `${idx+1}°`;
                    let colBorder = idx < 3 ? ["#D4AF37","#C0C0C0","#CD7F32"][idx] : "#444";
                    return `<div style='background:rgba(0,0,0,0.7);border-left:6px solid ${colBorder};border-radius:10px;padding:12px 20px;margin:6px auto;width:70%;color:#FFF;font-size:1.2rem;font-weight:700;text-align:left;'>
                        ${medal} ${al.TITULO || 'Dr.'} ${al.NOMBRE} — ${parseInt(al.PUNTOS)} pts
                    </div>`;
                }).join('');
                htmlInyectar = `<h2>📊 Resultados Parciales</h2>${filas}`;
            } 
    else if (fase === 99) {
                if (audioReproducido !== "ganador") { playAudio("ganador"); audioReproducido = "ganador"; }
                alumnos.sort((a,b) => b.PUNTOS - a.PUNTOS);
                let podioHtml = "";
                if(alumnos[0]) {
                    let t = (alumnos[0].TITULO || "").toLowerCase();
                    let n = (alumnos[0].NOMBRE || "").toLowerCase();
                    let esDra = t.includes("dra") || n.startsWith("dra") || n.includes("dra.");
                    
                    // Apunta estrictamente a los archivos de su programa en GitHub
                    let imgGanador = esDra ? "alumna_festejo_uba.png" : "alumno_festejo_uba.png";
                    let rutaFoto = IMG_BASE + imgGanador;
                    
                    podioHtml += `<div style="margin: 20px auto; min-height: 250px;"><img src="${rutaFoto}" class="img-ganador" style="max-height: 300px; object-fit: contain;"></div>`;
                    podioHtml += `<h1 class='titulo-oro'>🏆 ${alumnos[0].TITULO || 'Dr.'} ${alumnos[0].NOMBRE} 🏆</h1>`;
                    podioHtml += `<div class='box-oro'>🥇 ORO: ${alumnos[0].NOMBRE}<br><span style='font-size:1.5rem'>${parseInt(alumnos[0].PUNTOS)} puntos</span></div><br>`;
                }
                if(alumnos[1]) podioHtml += `<div class='box-plata'>🥈 PLATA: ${alumnos[1].NOMBRE} — ${parseInt(alumnos[1].PUNTOS)} pts</div><br>`;
                if(alumnos[2]) podioHtml += `<div class='box-bronce'>🥉 BRONCE: ${alumnos[2].NOMBRE} — ${parseInt(alumnos[2].PUNTOS)} pts</div>`;
                htmlInyectar = podioHtml;
            }
            else {
                let p = preguntas.find(preg => preg.ID == fase);
                if (!p) return;

                let relojHtml = (tLimite > ahora && yaVotoFase !== fase) ? `<div style='text-align:center'><div class='reloj-container' id='cronometro'>⏱️ --s</div></div>` : '';
                let opcionesHtml = "";
                let opcionesArr = [p.OP1, p.OP2, p.OP3, p.OP4].filter(o => o);
                
                if (yaVotoFase === fase) {
                    opcionesHtml = `<div class='espera-box'>📥 Tu dictamen fue enviado. Esperando resolución general...</div>`;
                } else {
                    opcionesHtml = `<div class='grid-opciones'>` + opcionesArr.map((op, i) => `
                        <button class='kahoot-btn' style='background:${COLORES[i]}' onclick='votarAlumno("${op.replace(/"/g, '&quot;')}", "${p.CORRECTA.replace(/"/g, '&quot;')}", ${tLimite})' ${tLimite <= ahora ? 'disabled':''}>
                            ${ICONOS[i]} ${op}
                        </button>
                    `).join('') + `</div>`;
                }

                alumnos.sort((a,b) => b.PUNTOS - a.PUNTOS);
                let filasTabla = alumnos.map((al, idx) => `<tr><td>${idx+1}°</td><td style="color:#FFF;">${al.TITULO || 'Dr.'} ${al.NOMBRE}</td><td>${parseInt(al.PUNTOS)} pts</td></tr>`).join('');

                htmlInyectar = `
                    <div class='pregunta-card'>❓ ${p.PREGUNTA}</div>
                    ${relojHtml}
                    ${opcionesHtml}
                    <hr style='border-color:#D4AF37; margin:30px 0;'>
                    <h3>👥 Calificaciones del Estrado en Vivo</h3>
                    <table>
                        <thead><tr><th>Rango</th><th>Magistrado</th><th>Puntos</th></tr></thead>
                        <tbody>${filasTabla || '<tr><td colspan="3">Sin registros</td></tr>'}</tbody>
                    </table>
                `;

                panel.innerHTML = htmlInyectar;

                if (tLimite > ahora && yaVotoFase !== fase) {
                    cronometroInterval = setInterval(() => {
                        let secRestantes = Math.max(0, Math.floor(tLimite - (Date.now() / 1000)));
                        let el = document.getElementById('cronometro');
                        if (el) el.innerText = `⏱️ ${secRestantes}s`;
                        if (secRestantes <= 0) { clearInterval(cronometroInterval); sincronizarNucleo(); }
                    }, 250);
                }
                return;
            }
            panel.innerHTML = htmlInyectar;
        }

        async function votarAlumno(opcionSeleccionada, opcionCorrecta, tLimite) {
            yaVotoFase = faseActual;
            let ahora = Date.now() / 1000;
            let esCorrecto = (opcionSeleccionada === opcionCorrecta);
            
            playAudio(esCorrecto ? "exito" : "error");
            let bonus = Math.max(0, Math.min(parseInt(tLimite - ahora), 15));
            let puntosA_Sumar = esCorrecto ? (10 + bonus) : 0;

            try {
                await fetch(URL_APPS_SCRIPT, {
                    method: 'POST',
                    body: JSON.stringify({ accion: "sumar_puntos", usuario: { email: USER.email, pts: puntosA_Sumar } })
                });
                sincronizarNucleo();
            } catch(e) { console.error(e); }
        }

        function renderizarDocente(fase, tLimite, alumnos, preguntas) {
            const panel = document.getElementById("pantalla-dinamica");
            
            if (faseActual === -1) {
                opcionSelectorDocenteLocal = fase.toString();
                faseActual = fase;
            }

            let tiempoEscrito = document.getElementById("docente-tiempo") ? document.getElementById("docente-tiempo").value : "30";

            let opcionesFases = `<option value="0" ${opcionSelectorDocenteLocal==="0"?'selected':''}>⏸️ Sala de Espera</option>`;
            preguntas.forEach(p => {
                opcionesFases += `<option value="${p.ID}" ${opcionSelectorDocenteLocal===p.ID.toString()?'selected':''}>❓ Pregunta ${p.ID}</option>`;
            });
            opcionesFases += `<option value="88" ${opcionSelectorDocenteLocal==="88"?'selected':''}>📊 Resultados Parciales</option>`;
            opcionesFases += `<option value="99" ${opcionSelectorDocenteLocal==="99"?'selected':''}>🏆 PODIO FINAL</option>`;

            let pActiva = preguntas.find(p => p.ID == fase);
            let InfoPreguntaHtml = pActiva 
                ? `<div class="pregunta-card" style="text-align:left; font-size:1.3rem; border-color:#1368CE;"><b>Fase activa: Pregunta ${pActiva.ID}</b><br>${pActiva.PREGUNTA}<br><small style="color:#CCFF00;">✅ Respuesta Correcta: ${pActiva.CORRECTA}</small></div>`
                : `<div class="espera-box" style="font-size:1.2rem;">Fase activa: ${fase === 0 ? 'Sala de Espera' : fase === 88 ? 'Resultados Parciales' : 'Podio Final'}</div>`;

            alumnos.sort((a,b) => b.PUNTOS - a.PUNTOS);
            let filasAlumnos = alumnos.map(al => `<tr><td style="color:#FFF;">${al.TITULO || 'Dr.'}</td><td style="color:#FFF;">${al.NOMBRE}</td><td style="color:#FFF;"><b>${parseInt(al.PUNTOS)} pts</b></td></tr>`).join('');

            panel.innerHTML = `
                <div class="panel-juez">
                    <h2 style="color:#D4AF37; margin-top:0;">⚖️ CONTROL CENTRAL DEL TRIBUNAL</h2>
                    <div id="flash-alerta" class="notif-flash">¡Fase Enviada al Servidor con éxito! 🎉</div>
                    
                    <div class="grid-docente-controles">
                        <div>
                            <label>📋 Seleccionar Escenario:</label>
                            <select id="docente-sel-fase" onchange="opcionSelectorDocenteLocal=this.value" style="width:100%; padding:10px; border-radius:5px;">${opcionesFases}</select>
                            <button class="docente-btn" style="margin-top:8px;" onclick="ejecutarComandoDocente('cambiar')">📢 Lanzar Fase</button>
                        </div>
                        <div>
                            <label>⏱️ Temporizador (Seg):</label>
                            <input type="number" id="docente-tiempo" value="${tiempoEscrito}" style="width:100%; padding:10px; border-radius:5px;">
                            <button class="docente-btn" style="margin-top:8px; background:#26890C; color:#FFF;" onclick="ejecutarComandoDocente('reloj')">▶️ Iniciar Cuenta</button>
                        </div>
                        <div>
                            <label>🔄 Acciones Rápidas:</label>
                            <button class="docente-btn" style="margin-bottom:5px; background:#555; color:#FFF;" onclick="sincronizarNucleo();">🔄 Forzar Refresco</button>
                            <button class="docente-btn" style="background:#E21B3C; color:#FFF;" onclick="ejecutarComandoDocente('reset')">⚠️ Resetear Todo</button>
                        </div>
                    </div>

                    ${InfoPreguntaHtml}
                    
                    <div style="margin:20px 0;">
                        <span class="votos-badge">👤 Alumnos Registrados: ${alumnos.length}</span>
                    </div>

                    <h3>👥 Lista de Calificaciones Generales</h3>
                    <table>
                        <thead><tr><th>Título</th><th>Magistrado</th><th>Calificación acumulada</th></tr></thead>
                        <tbody>${filasAlumnos || '<tr><td colspan="3" style="color:#FFF;">Aún no hay alumnos en sala.</td></tr>'}</tbody>
                    </table>
                </div>
            `;
        }

        async function ejecutarComandoDocente(tipo) {
            let f = document.getElementById("docente-sel-fase").value;
            if (tipo === 'cambiar') {
                await fetch(URL_APPS_SCRIPT, { method: 'POST', body: JSON.stringify({ accion: "escribir_sistema", fase: parseInt(f), tiempo: 0.0 }) });
                mostrarFlash(); sincronizarNucleo(); 
            } 
            else if (tipo === 'reloj') {
                let s = parseInt(document.getElementById("docente-tiempo").value);
                let target = (Date.now() / 1000) + s;
                await fetch(URL_APPS_SCRIPT, { method: 'POST', body: JSON.stringify({ accion: "escribir_sistema", fase: parseInt(f), tiempo: target }) });
                mostrarFlash(); sincronizarNucleo(); 
            } 
            else if (tipo === 'reset') {
                if(confirm("🚨 ¿Está seguro de vaciar la lista de participantes y reiniciar el juego por completo?")) {
                    await fetch(URL_APPS_SCRIPT, { method: 'POST', body: JSON.stringify({ accion: "reset_alumnos" }) });
                    alert("Tribunal reiniciado."); window.location.reload(); return;
                }
            }
        }

        function mostrarFlash() {
            let flash = document.getElementById("flash-alerta");
            if (flash) { flash.style.display = "block"; setTimeout(() => { flash.style.display = "none"; }, 2000); }
        }
    </script>
